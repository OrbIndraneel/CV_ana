# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = app/db/migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, allowed to be list of paths separated by semicolon.
# This allows Alembic to find app packages in backend/
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as well as the filename.
# string_type = str
# timezone = UTC

# version path separator; as-of Alembic 1.3.0, this defaults to os.pathsep.
# version_path_separator = :

[post_write_hooks]
# post_write_hooks defines scripts or tools that run after a revision is created.
# e.g., to run black or ruff formatting:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5s: %(message)s
datefmt = %H:%M:%S
